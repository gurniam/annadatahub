<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AnnadataHub — Admin</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Baloo+2:wght@600;800&family=Hind:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0a0f0a;--surface:#111811;--surface2:#162016;--border:#1e2e1e;
    --green:#00e676;--green-dim:#00c853;--green-glow:rgba(0,230,118,0.15);
    --gold:#ffd54f;--red:#ff5252;--blue:#40c4ff;
    --text:#e8f5e9;--muted:#546e54;--white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hind',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* LOGIN */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:360px;text-align:center;}
  .login-logo{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:var(--green);margin-bottom:4px;}
  .login-sub{color:var(--muted);font-size:0.82rem;margin-bottom:32px;font-family:'Space Mono',monospace;}
  .login-field{margin-bottom:16px;text-align:left;}
  .login-field label{font-size:0.75rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
  .login-field input{width:100%;background:#0d150d;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Hind',sans-serif;font-size:0.9rem;outline:none;transition:border 0.2s;}
  .login-field input:focus{border-color:var(--green);}
  .login-btn{width:100%;background:var(--green);color:#000;border:none;border-radius:8px;padding:13px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.2s;}
  .login-btn:hover{opacity:0.9;}
  .login-err{color:var(--red);font-size:0.8rem;margin-top:10px;display:none;}

  /* DASHBOARD */
  .dashboard{display:none;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-logo{font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;color:var(--green);}
  .topbar-meta{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted);}
  .logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:0.75rem;cursor:pointer;font-family:'Space Mono',monospace;}
  .logout-btn:hover{border-color:var(--red);color:var(--red);}

  .content{max-width:900px;margin:0 auto;padding:20px 16px;}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
  .tab-btn{flex-shrink:0;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
  .tab-btn.active{background:var(--green-glow);border-color:var(--green);color:var(--green);}

  /* STAT CARDS */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
  .stat-label{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .stat-value{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--green);line-height:1;}
  .stat-sub{font-size:0.72rem;color:var(--muted);margin-top:4px;}
  .stat-card.highlight{border-color:var(--green);background:var(--green-glow);}

  /* TABLES */
  .section-title{font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--green);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
  .data-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  .data-table th{text-align:left;padding:8px 12px;font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
  .data-table td{padding:10px 12px;border-bottom:1px solid #0f1a0f;color:var(--text);}
  .data-table tr:hover td{background:var(--surface2);}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.68rem;font-family:'Space Mono',monospace;font-weight:700;}
  .badge-green{background:rgba(0,230,118,0.15);color:var(--green);}
  .badge-gold{background:rgba(255,213,79,0.15);color:var(--gold);}
  .badge-blue{background:rgba(64,196,255,0.15);color:var(--blue);}
  .badge-red{background:rgba(255,82,82,0.15);color:var(--red);}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;overflow-x:auto;}

  /* BAR CHART */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .bar-label{font-size:0.75rem;color:var(--muted);width:100px;flex-shrink:0;font-family:'Space Mono',monospace;}
  .bar-track{flex:1;background:#0d150d;border-radius:4px;height:14px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width 0.8s ease;}
  .bar-count{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--green);width:30px;text-align:right;flex-shrink:0;}

  /* REFRESH */
  .refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;font-size:0.75rem;cursor:pointer;font-family:'Space Mono',monospace;margin-bottom:16px;}
  .refresh-btn:hover{border-color:var(--green);color:var(--green);}
  .loading-text{color:var(--muted);font-family:'Space Mono',monospace;font-size:0.8rem;padding:20px;text-align:center;}

  .page{display:none;}
  .page.active{display:block;}

  .empty-state{text-align:center;padding:40px;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.78rem;}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">🌾 AnnadataHub</div>
    <div class="login-sub">// ADMIN DASHBOARD</div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="pwdInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Access Dashboard →</button>
    <div class="login-err" id="loginErr">Wrong password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">🌾 AnnadataHub Admin</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="topbar-meta" id="lastRefresh">–</div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="content">
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('overview')">📊 Overview</button>
      <button class="tab-btn" onclick="showTab('farmers')">🧑‍🌾 Farmers</button>
      <button class="tab-btn" onclick="showTab('questions')">💬 Questions</button>
      <button class="tab-btn" onclick="showTab('posts')">📱 FarmGram</button>
    </div>

    <!-- OVERVIEW -->
    <div class="page active" id="tab-overview">
      <div class="stat-grid" id="statGrid">
        <div class="loading-text" style="grid-column:1/-1">Loading stats...</div>
      </div>
      <div class="card">
        <div class="section-title">Farmers by State</div>
        <div id="stateChart"><div class="loading-text">Loading...</div></div>
      </div>
      <div class="card">
        <div class="section-title">Farmers by Language</div>
        <div id="langChart"><div class="loading-text">Loading...</div></div>
      </div>
    </div>

    <!-- FARMERS -->
    <div class="page" id="tab-farmers">
      <button class="refresh-btn" onclick="loadFarmers()">↻ Refresh</button>
      <div class="card">
        <div class="section-title">Registered Farmers</div>
        <div id="farmersTable"><div class="loading-text">Loading...</div></div>
      </div>
    </div>

    <!-- QUESTIONS -->
    <div class="page" id="tab-questions">
      <button class="refresh-btn" onclick="loadQuestions()">↻ Refresh</button>
      <div class="card">
        <div class="section-title">AI Questions from Farmers</div>
        <div id="questionsTable"><div class="loading-text">Loading...</div></div>
      </div>
    </div>

    <!-- POSTS -->
    <div class="page" id="tab-posts">
      <button class="refresh-btn" onclick="loadPosts()">↻ Refresh</button>
      <div class="card">
        <div class="section-title">FarmGram Posts</div>
        <div id="postsTable"><div class="loading-text">Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND = "https://annadatahub-production-a9db.up.railway.app";
let adminPwd = "";

const LANG_NAMES = {en:"English",hi:"Hindi",pa:"Punjabi",mr:"Marathi",te:"Telugu",ta:"Tamil",kn:"Kannada",ml:"Malayalam",gu:"Gujarati",bn:"Bengali"};

function doLogin() {
  const pwd = document.getElementById("pwdInput").value.trim();
  if (!pwd) return;
  adminPwd = pwd;
  // Test with a stats call
  fetch(`${BACKEND}/api/admin/stats?password=${encodeURIComponent(pwd)}`)
    .then(r => {
      if (r.status === 403) throw new Error("wrong");
      return r.json();
    })
    .then(data => {
      if (!data.success) throw new Error("failed");
      document.getElementById("loginWrap").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      renderStats(data);
    })
    .catch(() => {
      document.getElementById("loginErr").style.display = "block";
      adminPwd = "";
    });
}

function doLogout() {
  adminPwd = "";
  document.getElementById("loginWrap").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("pwdInput").value = "";
  document.getElementById("loginErr").style.display = "none";
}

function showTab(tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  event.target.classList.add("active");
  if (tab === "farmers") loadFarmers();
  if (tab === "questions") loadQuestions();
  if (tab === "posts") loadPosts();
}

function timeAgo(str) {
  if (!str) return "–";
  const diff = Date.now() - new Date(str).getTime();
  const mins = Math.floor(diff/60000);
  const hours = Math.floor(diff/3600000);
  const days = Math.floor(diff/86400000);
  if (mins < 1) return "Just now";
  if (mins < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  return `${days}d ago`;
}

function badgeLang(lang) {
  const colors = {en:"badge-blue",hi:"badge-green",pa:"badge-gold",mr:"badge-green",te:"badge-blue",ta:"badge-blue",kn:"badge-gold",ml:"badge-gold",gu:"badge-green",bn:"badge-blue"};
  return `<span class="badge ${colors[lang]||'badge-blue'}">${LANG_NAMES[lang]||lang}</span>`;
}

// ── STATS ──
function renderStats(data) {
  const s = data.stats;
  document.getElementById("lastRefresh").textContent = `Refreshed: ${new Date().toLocaleTimeString()}`;
  document.getElementById("statGrid").innerHTML = `
    <div class="stat-card highlight">
      <div class="stat-label">Total Farmers</div>
      <div class="stat-value">${s.total_farmers}</div>
      <div class="stat-sub">Registered users</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">New This Week</div>
      <div class="stat-value" style="color:var(--gold)">${s.new_this_week}</div>
      <div class="stat-sub">Last 7 days</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Crop Scans</div>
      <div class="stat-value" style="color:var(--blue)">${s.total_scans}</div>
      <div class="stat-sub">Total scans done</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">AI Questions</div>
      <div class="stat-value" style="color:var(--green)">${s.total_questions}</div>
      <div class="stat-sub">Farmer queries</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">FarmGram Posts</div>
      <div class="stat-value" style="color:var(--gold)">${s.total_posts}</div>
      <div class="stat-sub">Community posts</div>
    </div>
  `;

  // State chart
  const maxState = Math.max(...(data.states||[]).map(s=>s.count), 1);
  document.getElementById("stateChart").innerHTML = (data.states||[]).length === 0
    ? '<div class="empty-state">No data yet</div>'
    : (data.states||[]).map(s => `
      <div class="bar-row">
        <div class="bar-label">${s._id||'Unknown'}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round((s.count/maxState)*100)}%"></div></div>
        <div class="bar-count">${s.count}</div>
      </div>`).join("");

  // Language chart
  const maxLang = Math.max(...(data.languages||[]).map(l=>l.count), 1);
  document.getElementById("langChart").innerHTML = (data.languages||[]).length === 0
    ? '<div class="empty-state">No data yet</div>'
    : (data.languages||[]).map(l => `
      <div class="bar-row">
        <div class="bar-label">${LANG_NAMES[l._id]||l._id||'Unknown'}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round((l.count/maxLang)*100)}%;background:var(--gold)"></div></div>
        <div class="bar-count">${l.count}</div>
      </div>`).join("");
}

// ── FARMERS ──
function loadFarmers() {
  document.getElementById("farmersTable").innerHTML = '<div class="loading-text">Loading farmers...</div>';
  fetch(`${BACKEND}/api/admin/farmers?password=${encodeURIComponent(adminPwd)}&limit=100`)
    .then(r => r.json())
    .then(data => {
      if (!data.farmers?.length) {
        document.getElementById("farmersTable").innerHTML = '<div class="empty-state">No farmers registered yet</div>';
        return;
      }
      document.getElementById("farmersTable").innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Name</th><th>Email</th><th>State</th><th>Language</th><th>Scans</th><th>Joined</th>
          </tr></thead>
          <tbody>
            ${data.farmers.map(f => `
              <tr>
                <td>${f.full_name||'–'}</td>
                <td style="color:var(--muted)">${f.email||'–'}</td>
                <td>${f.state||'–'}</td>
                <td>${badgeLang(f.language)}</td>
                <td style="color:var(--blue)">${f.scan_count||0}</td>
                <td style="color:var(--muted)">${timeAgo(f.created_at)}</td>
              </tr>`).join("")}
          </tbody>
        </table>`;
    })
    .catch(() => {
      document.getElementById("farmersTable").innerHTML = '<div class="empty-state">Error loading data</div>';
    });
}

// ── QUESTIONS ──
function loadQuestions() {
  document.getElementById("questionsTable").innerHTML = '<div class="loading-text">Loading questions...</div>';
  fetch(`${BACKEND}/api/admin/questions?password=${encodeURIComponent(adminPwd)}&limit=100`)
    .then(r => r.json())
    .then(data => {
      if (!data.questions?.length) {
        document.getElementById("questionsTable").innerHTML = '<div class="empty-state">No questions yet</div>';
        return;
      }
      document.getElementById("questionsTable").innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Question</th><th>Language</th><th>When</th>
          </tr></thead>
          <tbody>
            ${data.questions.map(q => `
              <tr>
                <td style="max-width:400px">${q.question||'–'}</td>
                <td>${badgeLang(q.language)}</td>
                <td style="color:var(--muted)">${timeAgo(q.created_at)}</td>
              </tr>`).join("")}
          </tbody>
        </table>`;
    })
    .catch(() => {
      document.getElementById("questionsTable").innerHTML = '<div class="empty-state">Error loading data</div>';
    });
}

// ── POSTS ──
function loadPosts() {
  document.getElementById("postsTable").innerHTML = '<div class="loading-text">Loading posts...</div>';
  fetch(`${BACKEND}/api/admin/posts?password=${encodeURIComponent(adminPwd)}&limit=100`)
    .then(r => r.json())
    .then(data => {
      if (!data.posts?.length) {
        document.getElementById("postsTable").innerHTML = '<div class="empty-state">No posts yet</div>';
        return;
      }
      document.getElementById("postsTable").innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Post</th><th>Crop</th><th>Location</th><th>Likes</th><th>When</th>
          </tr></thead>
          <tbody>
            ${data.posts.map(p => `
              <tr>
                <td style="max-width:350px">${p.content||'–'}</td>
                <td>${p.crop_type ? `<span class="badge badge-green">${p.crop_type}</span>` : '–'}</td>
                <td style="color:var(--muted)">${p.location||'–'}</td>
                <td style="color:var(--gold)">❤️ ${p.likes||0}</td>
                <td style="color:var(--muted)">${timeAgo(p.created_at)}</td>
              </tr>`).join("")}
          </tbody>
        </table>`;
    })
    .catch(() => {
      document.getElementById("postsTable").innerHTML = '<div class="empty-state">Error loading data</div>';
    });
}
</script>
</body>
</html>
