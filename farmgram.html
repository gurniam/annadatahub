<!DOCTYPE html>

<head>

<title>AnnadataHub — FarmGram</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--green:#1a5c2e;--green-mid:#2d7a45;--green-light:#e8f5ec;--gold:#f5a623;--gold-light:#fff8ec;--red:#dc2626;--red-light:#fee2e2;--bg:#f0f5f1;--white:#fff;--text:#1a2e1a;--muted:#6b7c6b;--border:#d0e4d4;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hind',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;}
  .header{background:linear-gradient(135deg,var(--green),var(--green-mid));padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  .logo{display:flex;align-items:center;gap:8px;}
  .logo-icon{width:36px;height:36px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
  .logo-name{font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:800;color:white;}
  .logo-name span{color:var(--gold);}
  .content{padding:14px;padding-bottom:80px;}
  .card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .btn{width:100%;padding:12px;border-radius:12px;border:none;font-family:'Baloo 2',cursive;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-green{background:var(--green);color:white;}
  .btn-gold{background:var(--gold);color:var(--text);}
  .btn:disabled{opacity:0.6;cursor:not-allowed;}
  .field{margin-bottom:10px;}
  label{font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:3px;display:block;}
  select,input,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Hind',sans-serif;font-size:0.86rem;background:white;color:var(--text);outline:none;}
  select:focus,input:focus,textarea:focus{border-color:var(--green);}
  textarea{resize:none;}
  .post-card{background:white;border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .post-header{padding:12px 14px;display:flex;align-items:center;gap:10px;}
  .post-avatar{width:40px;height:40px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;}
  .post-author{font-weight:700;font-size:0.88rem;}
  .post-meta{font-size:0.72rem;color:var(--muted);}
  .post-content{padding:0 14px 12px;font-size:0.88rem;line-height:1.6;color:#374151;}
  .post-image{width:100%;max-height:300px;object-fit:cover;}
  .post-crop{display:inline-block;padding:2px 10px;background:var(--green-light);color:var(--green);border-radius:20px;font-size:0.72rem;font-weight:700;margin:0 14px 8px;}
  .post-actions{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:16px;align-items:center;}
  .action-btn{background:none;border:none;cursor:pointer;font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:4px;font-family:'Hind',sans-serif;font-weight:600;padding:4px 8px;border-radius:8px;}
  .action-btn:hover{background:var(--bg);}
  .action-btn.liked{color:var(--red);}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty .icon{font-size:2.5rem;margin-bottom:10px;}
  .loading{text-align:center;padding:28px;}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 20px;border-radius:100px;font-size:0.83rem;z-index:1000;white-space:nowrap;max-width:90vw;text-align:center;}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--red);}
  .hidden{display:none;}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);padding:8px 0 10px;display:flex;justify-content:space-around;z-index:50;max-width:480px;margin:0 auto;}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:0.6rem;color:var(--muted);cursor:pointer;padding:4px 8px;font-weight:600;text-decoration:none;}
  .nav-item.active{color:var(--green);}
  .nav-icon{font-size:1.2rem;}
  .nav-scan{width:48px;height:48px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-top:-16px;box-shadow:0 4px 14px rgba(26,92,46,0.4);cursor:pointer;text-decoration:none;}
  .login-prompt{background:var(--gold-light);border:1px solid var(--gold);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px;}
  .photo-preview{width:100%;border-radius:10px;margin-top:8px;display:none;}
  .filter-bar{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .filter-btn{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Hind',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;color:var(--muted);}
  .filter-btn.active{background:var(--green);color:white;border-color:var(--green);}
</style>
</head>

function setLang(l) {
  currentLang = l;
  try { localStorage.setItem("annadatahub_lang", l); } catch(e) {}
  const t = FG_LABELS[l] || FG_LABELS.en;
  document.getElementById("fb-all").textContent = t.all;
  document.getElementById("fb-wheat").textContent = t.wheat;
  document.getElementById("fb-rice").textContent = t.rice;
  document.getElementById("fb-cotton").textContent = t.cotton;
  document.getElementById("fb-veg").textContent = t.veg;
  document.getElementById("fb-q").textContent = t.q;
  // Update post textarea placeholder if visible
  const ta = document.getElementById("postContent");
  if (ta) ta.placeholder = t.placeholder;
  const loadingEl = document.getElementById("loading-text");
  if (loadingEl) loadingEl.textContent = t.loading;
  // Nav labels
  const nh = document.getElementById("nav-home"); if (nh) nh.textContent = t.nav_home;
  const np = document.getElementById("nav-prices"); if (np) np.textContent = t.nav_prices;
  const nf = document.getElementById("nav-farmgram"); if (nf) nf.textContent = t.nav_farmgram;
  const nm = document.getElementById("nav-msp"); if (nm) nm.textContent = t.nav_msp;
}

// Auth helpers
function getToken() { try { return localStorage.getItem("auth_token"); } catch(e) { return null; } }
function getUser() { try { return JSON.parse(localStorage.getItem("auth_user")); } catch(e) { return null; } }

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast " + type; t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 3000);
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (mins < 1) return "Just now";
  if (mins < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  return `${days}d ago`;
}

function getInitials(name) {
  return (name || "F").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

function getAvatarColor(name) {
  const colors = ["#1a5c2e","#2563eb","#7c3aed","#dc2626","#92400e","#0ea5e9"];
  let hash = 0;
  for (let c of (name || "F")) hash = c.charCodeAt(0) + hash;
  return colors[hash % colors.length];
}

            <option>Vegetables</option><option>Fruits</option><option>Question</option>
          </select>
        </div>
        <div class="field">
          <input type="text" id="postLocation" placeholder="Your village/district (optional)"/>
        </div>
        <div class="field">
          <input type="file" id="postPhotoInput" accept="image/*" class="hidden" onchange="handlePostPhoto(event)"/>
          <button onclick="document.getElementById('postPhotoInput').click()" style="width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:10px;background:none;cursor:pointer;color:var(--muted);font-family:'Hind',sans-serif;font-size:0.86rem">
            📸 Add Photo (optional)
          </button>
          <img id="postPhotoPreview" class="photo-preview"/>
        </div>
        <button class="btn btn-green" onclick="createPost()" id="postBtn">${t.post_btn}</button>
      </div>`;
  } else {
    header.innerHTML = `<a href="index.html" style="background:var(--gold);color:var(--text);border:none;border-radius:8px;padding:6px 12px;font-family:'Baloo 2',cursive;font-size:0.8rem;font-weight:700;cursor:pointer;text-decoration:none">👤 Login</a>`;
    section.innerHTML = `
      <div class="login-prompt">
        <div style="font-size:1.5rem;margin-bottom:8px">🌾</div>
        <div style="font-family:'Baloo 2',cursive;font-weight:700;margin-bottom:4px">Join FarmGram!</div>
        <div style="font-size:0.84rem;color:var(--muted);margin-bottom:12px">Login to post, ask questions and connect with farmers across India</div>
        <a href="index.html" style="display:inline-block;background:var(--green);color:white;padding:10px 24px;border-radius:10px;font-family:'Baloo 2',cursive;font-weight:700;text-decoration:none">Login / Sign Up Free →</a>
      </div>`;
  }
}

function scrollToCreate() {
  document.getElementById("createPostSection").scrollIntoView({behavior: "smooth"});
}

function handlePostPhoto(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    selectedPhotoBase64 = ev.target.result.split(",")[1];
    const preview = document.getElementById("postPhotoPreview");
    preview.src = ev.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
}

async function createPost() {
  const content = document.getElementById("postContent")?.value?.trim();
  const crop = document.getElementById("postCrop")?.value;
  const location = document.getElementById("postLocation")?.value?.trim();
  const btn = document.getElementById("postBtn");

  if (!content) { showToast("Please write something to post", "error"); return; }

  btn.disabled = true; btn.textContent = (FG_LABELS[currentLang] || FG_LABELS.en).posting;

  try {
    const res = await fetch(`${BACKEND}/api/farmgram/post`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + getToken()
      },
      body: JSON.stringify({
        content,
        crop_type: crop || null,
        location: location || null,
        image_base64: selectedPhotoBase64 || null
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Failed to post");

    document.getElementById("postContent").value = "";
    document.getElementById("postCrop").value = "";
    document.getElementById("postLocation").value = "";
    document.getElementById("postPhotoPreview").style.display = "none";
    selectedPhotoBase64 = null;

    showToast("Posted! 🌾");
    await loadPosts();
  } catch(e) {
    showToast(e.message || "Could not post. Try again.", "error");
  }
  btn.disabled = false; btn.textContent = (FG_LABELS[currentLang] || FG_LABELS.en).post_btn;
}

async function loadPosts() {
  try {
    const res = await fetch(`${BACKEND}/api/farmgram/posts`);
    const data = await res.json();
    allPosts = data.posts || [];
    renderPosts(allPosts);
  } catch(e) {
    document.getElementById("postsFeed").innerHTML = `
      <div class="empty">
        <div class="icon">🌾</div>
        <p>No posts yet. Be the first to share!</p>
      </div>`;
  }
}

function filterPosts(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (filter === "all") {
    renderPosts(allPosts);
  } else {
    renderPosts(allPosts.filter(p => p.crop_type === filter));
  }
}

function renderPosts(posts) {
  const feed = document.getElementById("postsFeed");
  const token = getToken();
  const user = getUser();

  if (!posts || posts.length === 0) {
    feed.innerHTML = `
      <div class="empty">
        <div class="icon">🌾</div>
        <p>No posts yet${currentFilter !== "all" ? " for this crop" : ""}. Be the first to share!</p>
      </div>`;
    return;
  }

  feed.innerHTML = posts.map(post => {
    const initials = getInitials(post.user_name);
    const color = getAvatarColor(post.user_name);
    const hasLiked = false; // Would need per-user tracking

    return `
      <div class="post-card">
        <div class="post-header">
          <div class="post-avatar" style="background:${color}">${initials}</div>
          <div style="flex:1">
            <div class="post-author">${post.user_name || "Farmer"}</div>
            <div class="post-meta">
              ${post.user_state ? `📍 ${post.user_state}` : ""}
              ${post.location ? ` · ${post.location}` : ""}
              · ${timeAgo(post.created_at)}
            </div>
          </div>
        </div>
        ${post.image_base64 ? `<img src="data:image/jpeg;base64,${post.image_base64}" class="post-image" alt="Farm photo"/>` : ""}
        <div class="post-content">${post.content}</div>
        ${post.crop_type ? `<div class="post-crop">🌾 ${post.crop_type}</div>` : ""}
        <div class="post-actions">
          <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="likePost('${post.id}', this)" ${!token ? 'title="Login to like"' : ''}>
            ${hasLiked ? '❤️' : '🤍'} ${post.likes || 0}
          </button>
          <button class="action-btn" onclick="copyPost('${post.content.replace(/'/g, "\\'")}')">
            📤 Share
          </button>
        </div>
      </div>`;
  }).join("");
}

async function likePost(postId, btn) {
  const token = getToken();
  if (!token) {
    showToast("Login to like posts", "error");
    return;
  }
  try {
    const res = await fetch(`${BACKEND}/api/farmgram/like/${postId}`, {
      method: "POST",
      headers: {"Authorization": "Bearer " + token}
    });
    const data = await res.json();
    if (data.action === "liked") {
      btn.classList.add("liked");
      btn.innerHTML = "❤️ " + (parseInt(btn.textContent.replace(/\D/g, "")) + 1);
    } else {
      btn.classList.remove("liked");
      btn.innerHTML = "🤍 " + Math.max(0, parseInt(btn.textContent.replace(/\D/g, "")) - 1);
    }
  } catch(e) {
    showToast("Could not like. Try again.", "error");
  }
}

function copyPost(content) {
  const text = `${content}\n\n— Shared from AnnadataHub FarmGram 🌾\nannadatahub.com`;
  if (navigator.share) {
    navigator.share({title: "FarmGram Post", text: text}).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast((FG_LABELS[currentLang]||FG_LABELS.en).copied));
  }
}

// Init
try {
  const saved = localStorage.getItem("annadatahub_lang") || "en";
  currentLang = saved;
  setLang(saved);
} catch(e) {}

renderCreatePost();
loadPosts();
</script>
</body>
</html>
